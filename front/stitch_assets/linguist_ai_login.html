<p class="font-body-md text-sm text-on-surface-variant text-pretty">Sign in to continue your sessions</p>
</div>
<form class="flex flex-col gap-4" onsubmit="event.preventDefault(); window.location.href='linguist_ai_dashboard.html';">
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-xs font-semibold text-on-surface-variant" for="email">Email</label>
<div class="input-focus border border-[#2A2A32] rounded-lg bg-[#15151A] transition-all duration-200">
<input class="w-full bg-transparent border-none text-on-surface font-body-md text-body-md px-3.5 py-2.5 focus:ring-0 placeholder:text-on-surface-variant/40" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-xs font-semibold text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-xs text-primary hover:text-accent-glow hover:underline transition-colors duration-150" href="forgot_password.html">Forgot?</a>
</div>
<div class="input-focus border border-[#2A2A32] rounded-lg bg-[#15151A] transition-all duration-200">
<input class="w-full bg-transparent border-none text-on-surface font-body-md text-body-md px-3.5 py-2.5 focus:ring-0 placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/95 text-white font-medium py-2.5 px-4 rounded-lg active:scale-[0.97] transition-all duration-150 mt-2 flex items-center justify-center border border-primary/30 hover:border-[#8B7CFF]/50 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/50 shadow-[0_0_12px_rgba(110,91,255,0.25)]" type="submit">
    Continue
</button>
</form>
<div class="flex items-center gap-sm my-1">
<div class="h-[1px] flex-1 bg-outline"></div>
<span class="font-code-sm text-xs text-on-surface-variant uppercase tracking-wider">or</span>
<div class="h-[1px] flex-1 bg-outline"></div>
</div>
<button onclick="window.location.href='linguist_ai_dashboard.html';" class="w-full bg-surface-raised border border-outline text-on-surface font-medium py-2.5 px-4 rounded-lg hover:bg-[#1E1E24] active:scale-[0.97] transition-all duration-150 flex items-center justify-center gap-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/50" type="button">

</svg>

</button>
</div>
