</div>
</div>

</div>
<div class="input-focus border border-[#2A2A32] rounded-[10px] bg-[#15151A] transition-all duration-200">

</div>
</div>
<button class="w-full bg-primary-container text-white font-label-md text-label-md py-sm px-md rounded-[10px] hover:opacity-90 transition-opacity mt-sm flex items-center justify-center border border-primary-container hover:border-[#8B7CFF]" type="submit">
