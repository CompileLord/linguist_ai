<style>
        body {
            background-color: #0A0A0C;
            color: #e5e0ee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .goal-card {
            background-color: #15151A;
            border: 1px solid #2A2A32;
            border-radius: 14px;
            transition: all 200ms ease-out;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            gap: 16px;
            text-align: center;
        }

        .goal-card:hover {
            border-color: #474555;
        }

        .goal-card.selected {
            background-color: #1E1E24;
            border-color: #6E5BFF;
            box-shadow: 0 0 0 4px rgba(139, 124, 255, 0.2);
        }

        .goal-card .icon-container {
            font-size: 32px;
            color: #928ea1;
            transition: color 200ms ease-out;
        }

        .goal-card.selected .icon-container {
            color: #6E5BFF;
        }
        
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
        }

        .span-2 {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .span-2 {
                grid-column: span 1;
            }
            .bento-grid > :nth-child(1), .bento-grid > :nth-child(2) {
                grid-column: span 2;
            }
        }
        @media (max-width: 480px) {
             .bento-grid > :nth-child(1), .bento-grid > :nth-child(2) {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body class="antialiased selection:bg-primary-container selection:text-white">
<!-- Top Navigation (Suppressed per logic: Linear Onboarding Intent) -->
<!-- Side Navigation (Suppressed per logic: Linear Onboarding Intent) -->
<main class="flex-grow flex items-center justify-center p-md md:p-xl">
<div class="max-w-[800px] w-full mx-auto flex flex-col items-center">
<div class="text-center mb-xl w-full">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">What are you learning English for?</h1>
<p class="font-body-md text-body-md text-[#9A9AA5]">Choose up to 3</p>
</div>
<div class="bento-grid mb-xl">
<!-- Row 1 -->
<div class="goal-card span-2" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">flight_takeoff</span>
<span class="font-label-md text-label-md text-on-surface">Travel</span>
</div>
<div class="goal-card" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">work</span>
<span class="font-label-md text-label-md text-on-surface">Work</span>
</div>
<!-- Row 2 -->
<div class="goal-card" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">terminal</span>
<span class="font-label-md text-label-md text-on-surface">Programming</span>
</div>
<div class="goal-card" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">domain</span>
<span class="font-label-md text-label-md text-on-surface">Business</span>
</div>
<div class="goal-card" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">school</span>
<span class="font-label-md text-label-md text-on-surface">IELTS</span>
</div>
<!-- Row 3 -->
<div class="goal-card" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">description</span>
<span class="font-label-md text-label-md text-on-surface">TOEFL</span>
</div>
<div class="goal-card span-2" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">local_library</span>
<span class="font-label-md text-label-md text-on-surface">School</span>
</div>
<!-- Row 4 -->
<div class="goal-card span-2" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">account_balance</span>
<span class="font-label-md text-label-md text-on-surface">University</span>
</div>
<div class="goal-card" onclick="toggleCard(this)">
<span class="material-symbols-outlined icon-container" data-weight="regular">chat</span>
<span class="font-label-md text-label-md text-on-surface">Daily Communication</span>
</div>
</div>
<div class="w-full flex justify-center mt-auto md:mt-0">
<button class="bg-surface-container-highest text-on-surface-variant font-label-md text-label-md px-xl py-sm rounded-lg border border-[#2A2A32] transition-colors duration-200 w-full md:w-auto min-w-[200px]" disabled="" id="continueBtn">
                    Continue
                </button>
</div>
</div>
</main>
<script>
        let selectedCount = 0;
        const maxSelections = 3;
        const continueBtn = document.getElementById('continueBtn');

        function toggleCard(element) {
            const isSelected = element.classList.contains('selected');

            if (isSelected) {
                element.classList.remove('selected');
                selectedCount--;
            } else {
                if (selectedCount < maxSelections) {
                    element.classList.add('selected');
                    selectedCount++;
                } else {
                    // Provide some visual feedback that max is reached
                    element.style.transform = 'scale(0.98)';
                    setTimeout(() => element.style.transform = 'scale(1)', 100);
                }
            }

            updateButtonState();
        }

        function updateButtonState() {
            if (selectedCount > 0) {
                continueBtn.disabled = false;
                continueBtn.classList.remove('bg-surface-container-highest', 'text-on-surface-variant', 'border-[#2A2A32]');
                continueBtn.classList.add('bg-primary-container', 'text-white', 'border-transparent', 'hover:opacity-90');
            } else {
                continueBtn.disabled = true;
                continueBtn.classList.add('bg-surface-container-highest', 'text-on-surface-variant', 'border-[#2A2A32]');
                continueBtn.classList.remove('bg-primary-container', 'text-white', 'border-transparent', 'hover:opacity-90');
            }
        }
    </script>
</body></html>
