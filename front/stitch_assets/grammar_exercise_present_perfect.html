<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Linguist AI - Grammar Practice</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&amp;family=Hanken+Grotesk:wght@500;600&amp;family=Inter:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "tertiary-container": "#bb5b00",
                        "outline-variant": "#474555",
                        "error-container": "#93000a",
                        "on-primary-container": "#fffeff",
                        "tertiary-fixed-dim": "#ffb688",
                        "on-secondary-fixed": "#170065",
                        "inverse-surface": "#e5e0ee",
                        "on-tertiary-fixed": "#311300",
                        "on-background": "#e5e0ee",
                        "primary-fixed-dim": "#c6bfff",
                        "surface-tint": "#c6bfff",
                        "on-secondary-fixed-variant": "#422db2",
                        "inverse-on-surface": "#312f39",
                        "secondary-fixed-dim": "#c7bfff",
                        "on-tertiary-container": "#ffffff",
                        "background": "#13121c",
                        "surface-container-lowest": "#0e0d16",
                        "primary": "#c6bfff",
                        "outline": "#928ea1",
                        "on-primary-fixed": "#160066",
                        "surface-bright": "#393842",
                        "surface-container-low": "#1c1a24",
                        "on-secondary-container": "#b4abff",
                        "surface-container-highest": "#35343e",
                        "surface-container-high": "#2a2933",
                        "on-surface-variant": "#c8c4d8",
                        "surface-variant": "#35343e",
                        "on-primary-fixed-variant": "#3d1acf",
                        "on-error": "#690005",
                        "on-tertiary": "#512400",
                        "on-error-container": "#ffdad6",
                        "on-surface": "#e5e0ee",
                        "secondary": "#c7bfff",
                        "on-tertiary-fixed-variant": "#733500",
                        "surface": "#13121c",
                        "secondary-container": "#422db2",
                        "on-secondary": "#2a039d",
                        "tertiary-fixed": "#ffdbc7",
                        "inverse-primary": "#563fe6",
                        "surface-container": "#201e28",
                        "secondary-fixed": "#e4dfff",
                        "on-primary": "#2700a0",
                        "tertiary": "#ffb688",
                        "surface-dim": "#13121c",
                        "primary-container": "#6e5bff",
                        "primary-fixed": "#e4dfff",
                        
                        "success": "#3dd68c",
                        "success-bg": "rgba(61, 214, 140, 0.1)",
                        "custom-error": "#ff5c6c",
                        "custom-error-bg": "rgba(255, 92, 108, 0.1)",
                        "border-default": "#2a2a32"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "card": "10px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "gutter": "24px",
                        "xl": "64px",
                        "md": "24px",
                        "sm": "16px",
                        "lg": "40px",
                        "container-max": "1440px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "body-lg": ["Inter"],
                        "code-sm": ["Geist"],
                        "headline-md": ["Hanken Grotesk"],
                        "display": ["Hanken Grotesk"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Geist"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "code-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .progress-bar-fill {
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-white">
<!-- Top App Bar (Minimal per JSON/Prompt intent, but suppressing standard nav for focus) -->
<header class="w-full bg-background flex flex-col pt-xs px-sm md:px-gutter max-w-container-max mx-auto h-16 shrink-0 relative z-10">
<!-- Progress Bar (Thin line at absolute top) -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-container-high">
<div class="h-full bg-primary-container progress-bar-fill" style="width: 45%;"></div>
</div>
<div class="flex justify-between items-center w-full h-full">
<div class="w-10"></div> <!-- Spacer for balance -->
<div class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span aria-hidden="true" class="material-symbols-outlined text-sm" data-icon="exercise">exercise</span>
<span>Present Perfect Practice</span>
</div>
<!-- Close Action (Transactional departure) -->
<button aria-label="Exit practice" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors duration-200 text-on-surface-variant focus:outline-none focus:ring-1 focus:ring-primary-container">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center w-full px-sm pb-xl overflow-y-auto">
<!-- Focused Canvas (Max 560px) -->
<div class="w-full max-w-[560px] flex flex-col pt-lg md:pt-xl gap-lg">
<!-- Question Area -->
<section aria-labelledby="question-heading" class="flex flex-col gap-sm">
<h1 class="font-headline-md text-headline-md text-on-background" id="question-heading">
                    Choose the correct form:
                </h1>
<p class="font-body-lg text-body-lg text-on-surface">
                    She <span aria-hidden="true" class="inline-block border-b border-outline-variant w-12 text-center pb-1 text-on-surface-variant">___</span> in London for five years.
                </p>
</section>
<!-- Options Grid -->
<section aria-labelledby="options-heading" class="flex flex-col gap-sm mt-sm">
<h2 class="sr-only" id="options-heading">Answer Options</h2>
<!-- Option 1: Default -->
<button class="group w-full bg-[#15151A] border border-border-default rounded-card p-sm flex items-center justify-between text-left transition-all duration-200 hover:border-primary-container hover:bg-surface-container-low focus:outline-none focus:ring-1 focus:ring-primary-container">
<span class="font-body-md text-body-md text-on-surface">lives</span>
</button>
<!-- Option 2: Default -->
<button class="group w-full bg-[#15151A] border border-border-default rounded-card p-sm flex items-center justify-between text-left transition-all duration-200 hover:border-primary-container hover:bg-surface-container-low focus:outline-none focus:ring-1 focus:ring-primary-container">
<span class="font-body-md text-body-md text-on-surface">is living</span>
</button>
<!-- Option 3: Selected Correct (Mock State) -->
<button aria-describedby="feedback-success" aria-pressed="true" class="group w-full bg-success-bg border border-success rounded-card p-sm flex items-center justify-between text-left transition-all duration-200 focus:outline-none focus:ring-1 focus:ring-success">
<span class="font-body-md text-body-md text-on-surface">has lived</span>
<span class="material-symbols-outlined text-success" data-icon="check_circle">check_circle</span>
</button>
<!-- Option 4: Default -->
<button class="group w-full bg-[#15151A] border border-border-default rounded-card p-sm flex items-center justify-between text-left transition-all duration-200 hover:border-primary-container hover:bg-surface-container-low focus:outline-none focus:ring-1 focus:ring-primary-container">
<span class="font-body-md text-body-md text-on-surface">was living</span>
</button>
</section>
<!-- Explanation / Context Panel -->
<div aria-live="polite" class="flex flex-col gap-xs mt-sm bg-surface-container-lowest border border-border-default rounded-lg p-sm" id="feedback-success" role="region">
<div class="flex items-center gap-xs text-primary">
<span class="material-symbols-outlined text-[18px]" data-icon="info">info</span>
<span class="font-label-md text-label-md">Explanation</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-relaxed">
                    We use the present perfect ('has lived') to describe an action that started in the past and continues to the present.
                </p>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="w-full bg-background border-t border-surface-container p-sm md:p-md shrink-0 sticky bottom-0 z-20">
<div class="max-w-[560px] mx-auto flex justify-end">
<button class="bg-primary-container hover:bg-primary text-white font-label-md text-label-md px-lg py-xs rounded-lg transition-colors duration-200 focus:outline-none focus:ring-1 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background flex items-center gap-2">
                Continue
                <span aria-hidden="true" class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
