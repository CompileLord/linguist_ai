<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - LinguistAI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#0A0A0C",
                        surface: "#15151A",
                        "surface-raised": "#1E1E24",
                        outline: "#2A2A32",
                        "outline-variant": "#2A2A32",
                        primary: "#6E5BFF",
                        "primary-container": "#6E5BFF",
                        "on-primary-container": "#F5F5F7",
                        "on-surface": "#F5F5F7",
                        "on-surface-variant": "#9A9AA5",
                        "text-tertiary": "#62626C",
                        accent: "#6E5BFF",
                        "accent-glow": "#8B7CFF",
                        success: "#3DD68C",
                        warning: "#E8B339",
                        error: "#FF5C6C",
                        // Keep compatibility with existing container levels
                        "surface-container-lowest": "#0A0A0C",
                        "surface-container-low": "#15151A",
                        "surface-container": "#15151A",
                        "surface-container-high": "#1E1E24",
                        "surface-container-highest": "#2A2A32",
                    },
                    borderRadius: {
                        "DEFAULT": "8px",
                        "md": "8px",
                        "lg": "12px",
                        "xl": "16px",
                        "full": "9999px"
                    },
                    spacing: {
                        "md": "24px",
                        "xl": "64px",
                        "lg": "40px",
                        "gutter": "24px",
                        "xs": "8px",
                        "sm": "16px",
                        "container-max": "1440px",
                        "base": "4px"
                    },
                    fontFamily: {
                        "headline-lg": ["Hanken Grotesk", "sans-serif"],
                        "label-md": ["Geist", "sans-serif"],
                        "display": ["Hanken Grotesk", "sans-serif"],
                        "body-sm": ["Inter", "sans-serif"],
                        "code-sm": ["Geist", "monospace"],
                        "body-md": ["Inter", "sans-serif"],
                        "headline-md": ["Hanken Grotesk", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"]
                    },
                    fontSize: {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "code-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0A0A0C;
            color: #F5F5F7;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-sm md:p-md text-on-surface bg-background font-body-md antialiased selection:bg-primary/20 selection:text-primary">
<main class="w-full max-w-[420px] flex flex-col gap-sm">
<!-- Card Container -->
<div class="bg-surface rounded-xl border border-outline p-8 w-full flex flex-col gap-6 shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
<div class="flex flex-col gap-1 items-center text-center">
<span class="font-bold text-xs text-primary uppercase tracking-widest mb-2">Linguist AI</span>
<h1 class="font-headline-lg text-2xl font-bold text-on-surface tracking-tight text-balance">Reset Password</h1>
<p class="font-body-md text-sm text-on-surface-variant text-pretty">Enter your account details to recover access</p>
</div>
<form onsubmit="event.preventDefault(); alert('Password reset link sent to your recovery details.'); window.location.href='linguist_ai_login.html';" class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-xs font-semibold text-on-surface-variant" for="username">Username</label>
<input class="w-full bg-surface-raised border border-outline rounded-lg text-on-surface placeholder:text-on-surface-variant/40 font-body-md text-body-md px-3.5 py-2.5 focus:border-primary focus:ring-0 focus:outline-none transition-all duration-200 focus:shadow-[0_0_14px_rgba(110,91,255,0.15)]" id="username" name="username" placeholder="Enter your username" required="" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-xs font-semibold text-on-surface-variant" for="recovery-answer">Security Question: What was your first pet's name?</label>
<input class="w-full bg-surface-raised border border-outline rounded-lg text-on-surface placeholder:text-on-surface-variant/40 font-body-md text-body-md px-3.5 py-2.5 focus:border-primary focus:ring-0 focus:outline-none transition-all duration-200 focus:shadow-[0_0_14px_rgba(110,91,255,0.15)]" id="recovery-answer" name="recovery-answer" placeholder="Answer here" required="" type="text"/>
</div>
<button class="w-full bg-primary hover:bg-primary/95 text-white font-medium py-2.5 px-4 rounded-lg active:scale-[0.97] transition-all duration-150 mt-2 flex items-center justify-center border border-primary/30 hover:border-[#8B7CFF]/50 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/50 shadow-[0_0_12px_rgba(110,91,255,0.25)]" type="submit">
    Request Reset
</button>
</form>
</div>
<div class="text-center font-body-sm text-sm text-on-surface-variant">
    Remembered your password? <a class="text-primary hover:text-accent-glow hover:underline transition-colors duration-150 font-medium ml-1" href="linguist_ai_login.html">Log in</a>
</div>
</main>
</body></html>
