<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Placement Result - Linguist AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Hanken+Grotesk:wght@400;500;600;700;800&amp;family=Geist:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#0A0A0C",
                        surface: "#15151A",
                        "surface-raised": "#1E1E24",
                        outline: "#2A2A32",
                        "outline-variant": "#2A2A32",
                        primary: "#6E5BFF",
                        "primary-container": "#6E5BFF",
                        "on-primary-container": "#F5F5F7",
                        "on-surface": "#F5F5F7",
                        "on-surface-variant": "#9A9AA5",
                        "text-tertiary": "#62626C",
                        accent: "#6E5BFF",
                        "accent-glow": "#8B7CFF",
                        success: "#3DD68C",
                        warning: "#E8B339",
                        error: "#FF5C6C",
                        // Keep compatibility with existing container levels
                        "surface-container-lowest": "#0A0A0C",
                        "surface-container-low": "#15151A",
                        "surface-container": "#15151A",
                        "surface-container-high": "#1E1E24",
                        "surface-container-highest": "#2A2A32",

                    borderRadius: {
                        "DEFAULT": "8px",
                        "md": "8px",
                        "lg": "12px",
                        "xl": "16px",
                        "full": "9999px"

                    spacing: {
                        "container-max": "1440px",
                        "base": "4px",
                        "md": "24px",
                        "sm": "16px",
                        "gutter": "24px",
                        "xs": "8px",
                        "xl": "64px",
                        "lg": "40px"

                    fontFamily: {
                        "label-md": ["Geist", "sans-serif"],
                        "body-sm": ["Inter", "sans-serif"],

                        "code-sm": ["Geist", "monospace"],
                        "body-md": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "headline-lg": ["Hanken Grotesk", "sans-serif"],
                        "display": ["Hanken Grotesk", "sans-serif"]
                    },
                    fontSize: {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }],

                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0A0A0C;
            color: #F5F5F7;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary/20 selection:text-primary overflow-x-hidden">
<!-- TopNavBar -->
<header class="bg-surface/85 backdrop-blur-md fixed top-0 w-full z-50 border-b border-outline">
<div class="flex justify-between items-center h-16 px-md max-w-container-max mx-auto">
<div class="flex items-center">
<span class="font-headline-md text-headline-md font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-accent-glow tracking-tight">Linguist AI</span>
</div>
<div class="flex items-center gap-sm">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-95 transition-transform rounded-lg hover:bg-surface-raised/50 focus:outline-none">
<span class="material-symbols-outlined block text-xl">settings</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-95 transition-transform rounded-lg hover:bg-surface-raised/50 focus:outline-none">
<span class="material-symbols-outlined block text-xl">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center pt-xl pb-xl px-md mt-16 relative w-full max-w-[800px] mx-auto z-10">
<!-- Ambient Glow Base -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none -z-10">
<div class="w-64 h-64 bg-primary/10 rounded-full opacity-30 blur-3xl transform scale-150"></div>
</div>
<div class="flex flex-col items-center justify-center text-center w-full max-w-md mx-auto space-y-lg opacity-0 animate-[fadeIn_1s_ease-out_forwards]">
<!-- Hero CEFR Level -->
<div class="relative flex items-center justify-center py-lg w-full">
<div class="absolute w-40 h-40 bg-primary/20 rounded-full opacity-20 blur-2xl z-0"></div>
<h1 class="font-display font-bold relative z-10 tracking-tighter bg-clip-text text-transparent bg-gradient-to-br from-[#F5F5F7] via-[#8B7CFF] to-[#6E5BFF]" style="font-size: 8rem; line-height: 1;">
    B2
</h1>
</div>
<!-- Description -->
<div class="space-y-sm px-sm z-10">
<p class="font-body-lg text-lg text-on-surface-variant leading-relaxed text-pretty">
    Your English is solid. You can express complex ideas fluently and you're ready to master professional nuances.
</p>
</div>
<!-- Stats -->
<div class="flex items-center justify-center gap-md font-body-sm text-sm text-on-surface-variant/80 z-10 font-medium">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px] text-primary">timer</span>
<span class="tabular-nums">Time: 14:20</span>
</div>
<div class="w-1 h-1 bg-outline rounded-full"></div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px] text-primary">check_circle</span>
<span class="tabular-nums">Accuracy: 88%</span>
</div>
</div>
<!-- Action -->
<div class="pt-md w-full flex justify-center z-10">
<button onclick="window.location.href='linguist_ai_dashboard.html';" class="bg-primary hover:bg-primary/95 text-white font-medium px-8 py-3 rounded-lg active:scale-[0.96] transition-all duration-150 shadow-[0_0_15px_rgba(110,91,255,0.25)] border border-[#8B7CFF]/30 hover:border-[#8B7CFF]/60 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/50 text-sm">
    Go to Dashboard
</button>
</div>
</div>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
