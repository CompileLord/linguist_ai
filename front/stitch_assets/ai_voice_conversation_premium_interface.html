<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Linguist AI - Live Speaking Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&amp;family=Inter:wght@400;500&amp;family=Geist:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#e5e0ee",
                        "on-secondary-container": "#b4abff",
                        "secondary-fixed-dim": "#c7bfff",
                        "on-surface-variant": "#c8c4d8",
                        "on-primary-fixed-variant": "#3d1acf",
                        "error": "#ffb4ab",
                        "surface-variant": "#35343e",
                        "surface-tint": "#c6bfff",
                        "surface-bright": "#393842",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#160066",
                        "background": "#13121c",
                        "primary-fixed-dim": "#c6bfff",
                        "tertiary-fixed-dim": "#ffb688",
                        "tertiary-container": "#bb5b00",
                        "surface-container-high": "#2a2933",
                        "on-error": "#690005",
                        "on-surface": "#e5e0ee",
                        "on-primary-container": "#fffeff",
                        "surface-container-lowest": "#0e0d16",
                        "on-background": "#e5e0ee",
                        "inverse-primary": "#563fe6",
                        "secondary-container": "#422db2",
                        "on-tertiary-fixed": "#311300",
                        "tertiary-fixed": "#ffdbc7",
                        "outline": "#928ea1",
                        "on-secondary-fixed-variant": "#422db2",
                        "primary-fixed": "#e4dfff",
                        "tertiary": "#ffb688",
                        "surface-container-highest": "#35343e",
                        "surface-container-low": "#1c1a24",
                        "on-tertiary-container": "#ffffff",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#733500",
                        "on-secondary-fixed": "#170065",
                        "on-tertiary": "#512400",
                        "inverse-on-surface": "#312f39",
                        "on-secondary": "#2a039d",
                        "on-primary": "#2700a0",
                        "outline-variant": "#474555",
                        "surface-dim": "#13121c",
                        "secondary": "#c7bfff",
                        "primary-container": "#6e5bff",
                        "primary": "#c6bfff",
                        "surface-container": "#201e28",
                        "surface": "#13121c",
                        "secondary-fixed": "#e4dfff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "sm": "16px",
                        "container-max": "1440px",
                        "base": "4px",
                        "md": "24px",
                        "xl": "64px",
                        "lg": "40px",
                        "gutter": "24px",
                        "72": "18rem",
                        "96": "24rem"
                    },
                    "fontFamily": {
                        "display": ["Hanken Grotesk"],
                        "label-md": ["Geist"],
                        "code-sm": ["Geist"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "code-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.02); }
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface h-screen w-full flex flex-col relative overflow-hidden font-body-md text-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Status Layer -->
<header class="absolute top-0 w-full flex justify-end p-lg md:p-xl z-30 pointer-events-none">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-[16px] text-outline font-light">schedule</span>
<span class="font-label-md text-label-md text-outline">15:42 left today</span>
</div>
</header>
<!-- Main Immersive Canvas -->
<main class="flex-1 flex flex-col items-center justify-center relative z-10 w-full h-full">
<!-- Ambient Background Glow -->
<div class="absolute w-72 h-72 md:w-96 md:h-96 bg-primary-container/10 rounded-full blur-[120px] pointer-events-none pulse-slow mix-blend-screen"></div>
<!-- AI Speaker Orb Container -->
<div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full overflow-hidden shadow-[0_0_80px_rgba(110,91,255,0.05)] border border-surface-variant z-20 group transition-transform duration-700 ease-out hover:scale-[1.02]">

<!-- Inner ring highlight -->
<div class="absolute inset-0 rounded-full border border-primary/20 pointer-events-none"></div>
</div>
<!-- Status Typography -->
<div class="absolute bottom-1/4 md:bottom-1/3 flex flex-col items-center gap-xs opacity-70">
<h1 class="font-headline-md text-headline-md text-on-surface tracking-wide">Listening</h1>
<div class="flex gap-1 items-center">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay: 0ms"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay: 150ms"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay: 300ms"></div>
</div>
</div>
</main>
<!-- Bottom Control Dock -->
<footer class="w-full flex flex-col items-center pb-xl z-30 relative">
<!-- Primary Actions -->
<div class="flex items-center gap-md mb-lg">
<!-- Mic Toggle (Active State) -->
<button class="w-16 h-16 rounded-full flex items-center justify-center bg-surface border border-outline-variant text-on-surface hover:border-primary hover:text-primary transition-all duration-300 focus:outline-none focus:ring-1 focus:ring-primary group shadow-sm">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform duration-300" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<!-- End Session -->
<button class="w-16 h-16 rounded-full flex items-center justify-center border border-outline-variant text-error hover:bg-error/10 hover:border-error transition-all duration-300 focus:outline-none focus:ring-1 focus:ring-error group">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform duration-300">call_end</span>
</button>
</div>
<!-- Contextual Affordance -->
<button class="flex items-center gap-xs text-on-surface-variant hover:text-on-surface transition-colors duration-200 font-label-md text-label-md group focus:outline-none rounded-DEFAULT px-sm py-xs">
            Show transcript
            <span class="material-symbols-outlined text-[18px] group-hover:-translate-y-0.5 transition-transform duration-200">keyboard_arrow_up</span>
</button>
</footer>
</body></html>
